<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/png" href="img/6_salsa_bottle/salsa_bottle.png">
    <title>El Pollo Loco</title>
    <script src="models/movable-object.class.js"></script>
    <script src="models/keyboard.class.js"></script>
    <script src="models/character.class.js"></script>
    <script src="models/chicken.class.js"></script>
    <script src="models/endboss.class.js"></script>
    <script src="models/background-object.class.js"></script>
    <script src="models/status-bar.class.js"></script>
    <script src="models/throwable-object.class.js"></script>
    <script src="models/coin.class.js"></script>
    <script src="models/bottle-ground.class.js"></script>
    <script src="models/sound-manager.class.js"></script>
    <script src="models/world.class.js"></script>
    <script src="js/game.js"></script>

</head>

<body onload="init()">
    <h1>El Pollo Loco</h1>

    <div id="canvasContainer">
        <canvas id="gameCanvas" width="720" height="480"></canvas>

        <button id="muteBtn" onclick="toggleMute()">🔊</button>
        <button id="fullscreenBtn" onclick="toggleFullscreen()">⛶</button>

        <div id="startScreen" class="overlay">
            <img src="img/9_intro_outro_screens/start/startscreen_1.png" class="overlayImg" alt="Startscreen">
            <button onclick="startGame()">Spiel starten</button>
            <button onclick="showKeys()">Steuerung</button>
        </div>

        <div id="keysScreen" class="overlay d-none">
            <div class="keysBox">
                <h2>Steuerung</h2>
                <ul>
                    <li><span class="key">◀ ▶</span><span class="label">Laufen (Pfeiltasten)</span></li>
                    <li><span class="key">▲ / Leertaste</span><span class="label">Springen</span></li>
                    <li><span class="key">D</span><span class="label">Flasche werfen</span></li>
                </ul>
                <button onclick="hideKeys()">Schließen</button>
            </div>
        </div>

        <div id="endScreen" class="overlay d-none">
            <img id="endImg" class="overlayImg" alt="Endscreen">
            <div class="endButtons">
                <button onclick="startGame()">Nochmal spielen</button>
                <button onclick="backToStart()">Zum Start</button>
            </div>
        </div>

        <div id="touchControls">
            <div class="touchGroup">
                <button id="btnLeft" class="touchBtn">◀</button>
                <button id="btnRight" class="touchBtn">▶</button>
            </div>
            <div class="touchGroup">
                <button id="btnJump" class="touchBtn">▲</button>
                <button id="btnThrow" class="touchBtn">D</button>
            </div>
        </div>
    </div>

    <a href="impressum.html" class="impressumLink">Impressum</a>

    <div id="rotateHint">
        <p>Bitte drehe dein Gerät ins Querformat, um zu spielen. 📱↻</p>
    </div>
</body>

</html>
